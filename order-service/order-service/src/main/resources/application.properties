spring.application.name=order-service
# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/smartshop_order
spring.datasource.username=root
spring.datasource.password=180618

# Hibernate Settings
# 'update' means Hibernate will automatically create tables based on your Java code
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=8083
spring.cloud.compatibility-verifier.enabled=false
logging.level.com.smartshop.order_service.client.ProductClient=DEBUG

# Eureka Connection
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/